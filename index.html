<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂點數管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, increment, deleteDoc, initializeFirestore, persistentLocalCache } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 解析環境提供的 Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        
        // 為了優化連線穩定性，初始化 Firestore 並加入本地快取支持
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache()
        });
        
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'classroom-points-tool';

        const TEACHER_PASSWORD = "0424"; 

        let currentView = 'home'; 
        let studentsData = {};
        let itemsData = {};
        let pendingAction = null; 
        let user = null;

        const appContainer = document.getElementById('app');

        // --- 通知系統 ---
        function showStatus(text, type = 'info') {
            const statusMsg = document.getElementById('status-msg');
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-600' };
            statusMsg.textContent = text;
            statusMsg.className = `fixed bottom-6 right-6 text-white px-8 py-4 rounded-3xl shadow-2xl transition-all duration-300 z-[10000] font-bold ${colors[type]}`;
            statusMsg.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => { 
                statusMsg.classList.add('opacity-0', 'translate-y-10'); 
            }, 3000);
        }

        // --- 指數退避重試邏輯 (針對 API 調用) ---
        async function withRetry(fn, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    return await fn();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // --- 核心邏輯 ---
        window.updatePoints = async (studentId, isPositive = true) => {
            if (!auth.currentUser) return;
            const input = document.getElementById(`input-${studentId}`);
            const amount = (parseInt(input?.value) || 1) * (isPositive ? 1 : -1);
            try {
                await withRetry(async () => {
                    const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId);
                    await updateDoc(studentRef, { points: increment(amount), lastUpdate: Date.now() });
                });
                showStatus(`點數已更新`, "success");
            } catch (e) { 
                showStatus("連線不穩定，請稍後再試", "error"); 
            }
        };

        // --- ID 變更邏輯 ---
        window.openChangeIdModal = (oldId) => {
            pendingAction = { type: 'changeId', oldId };
            const modal = document.getElementById('generic-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const input = document.getElementById('modal-input');
            
            title.textContent = "變更學生 ID";
            desc.textContent = "請輸入新的學生 ID (卡片號碼)：";
            input.placeholder = "新 ID";
            input.value = "";
            input.type = "text";
            
            modal.classList.remove('hidden');
            input.focus();
        };

        async function processChangeId(newId) {
            if (!auth.currentUser) return;
            const oldId = pendingAction.oldId;
            if (!newId || newId === oldId) return;
            if (studentsData[newId]) { showStatus("此 ID 已被使用", "error"); return; }
            
            try {
                await withRetry(async () => {
                    const oldData = studentsData[oldId];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', newId), {
                        ...oldData, id: newId, lastUpdate: Date.now()
                    });
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', oldId));
                });
                showStatus("ID 變更成功", "success");
                closeGenericModal();
            } catch (e) { showStatus("操作超時，請檢查網路", "error"); }
        }

        // --- 商城兌換邏輯 ---
        window.openRedeemModal = (itemId) => {
            const item = itemsData[itemId];
            if (item.stock <= 0) { showStatus("庫存不足", "error"); return; }
            
            pendingAction = { type: 'redeem', itemId };
            const modal = document.getElementById('generic-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const input = document.getElementById('modal-input');
            
            title.textContent = `兌換：${item.name}`;
            desc.textContent = `需要 ${item.cost} 點。請輸入您的學生 ID 確認：`;
            input.placeholder = "您的 ID";
            input.value = "";
            input.type = "text";
            
            modal.classList.remove('hidden');
            input.focus();
        };

        async function processRedeem(studentId) {
            if (!auth.currentUser) return;
            const itemId = pendingAction.itemId;
            const student = studentsData[studentId];
            const item = itemsData[itemId];

            if (!student) { showStatus("找不到該學生 ID", "error"); return; }
            if (student.points < item.cost) { showStatus("點數不足，無法兌換", "error"); return; }
            if (item.stock <= 0) { showStatus("商品已售罄", "error"); return; }

            try {
                await withRetry(async () => {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId), {
                        points: increment(-item.cost),
                        lastUpdate: Date.now()
                    });
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', itemId), {
                        stock: increment(-1)
                    });
                });
                showStatus("兌換成功！請領取獎品", "success");
                closeGenericModal();
            } catch (e) { showStatus("兌換失敗，請檢查網路連接", "error"); }
        }

        // --- 通用視窗控制 ---
        window.closeGenericModal = () => {
            document.getElementById('generic-modal').classList.add('hidden');
            pendingAction = null;
        };

        window.submitGenericModal = () => {
            const val = document.getElementById('modal-input').value.trim();
            if (!val) return;
            if (pendingAction.type === 'changeId') processChangeId(val);
            if (pendingAction.type === 'redeem') processRedeem(val);
        };

        // --- 路由系統 ---
        window.switchView = (view) => {
            currentView = view;
            document.body.scrollTo(0, 0);
            if (view === 'home') renderHome();
            else if (view === 'shop') renderShop();
            else if (view === 'teacher') renderTeacher();
        };

        // --- 視圖渲染 ---
        function renderHome() {
            appContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[90vh] p-6 text-center animate-in">
                    <div class="mb-12">
                        <h1 class="text-4xl font-black text-slate-800 mb-3 tracking-tight">課堂管理系統</h1>
                        <p class="text-slate-400 font-medium">感應或輸入學生 ID 查詢</p>
                    </div>
                    <div id="student-result" class="w-full max-w-sm">
                        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                            <input id="query-id" type="text" placeholder="輸入 ID" class="w-full bg-slate-50 p-5 rounded-3xl text-center mb-6 font-bold text-xl outline-none focus:ring-4 focus:ring-blue-100 transition-all">
                            <button onclick="handleInquiry(document.getElementById('query-id').value)" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg hover:bg-slate-800 active:scale-95 transition mb-4">查詢點數</button>
                            <button onclick="switchView('shop')" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-lg hover:bg-blue-500 active:scale-95 transition shadow-lg">兌換商城</button>
                        </div>
                    </div>
                    <button onclick="toggleLoginModal(true)" class="mt-16 text-slate-300 hover:text-blue-500 font-bold underline underline-offset-8 transition-colors">教師登入</button>
                </div>
            `;
        }

        function renderShop() {
            appContainer.innerHTML = `
                <div class="p-6 max-w-5xl mx-auto animate-in">
                    <div class="flex justify-between items-center mb-10 bg-white p-8 rounded-[2.5rem] shadow-sm">
                        <h1 class="text-3xl font-black text-slate-800">獎品兌換商城</h1>
                        <button onclick="switchView('home')" class="bg-slate-100 text-slate-600 px-8 py-3 rounded-2xl font-black hover:bg-slate-200">返回</button>
                    </div>
                    <div id="shop-items-list" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
                </div>
            `;
            updateShopUI();
        }

        function renderTeacher() {
            appContainer.innerHTML = `
                <div class="p-6 max-w-7xl mx-auto animate-in pb-20">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <h1 class="text-3xl font-black text-slate-800">教師管理系統</h1>
                        <button onclick="switchView('home')" class="bg-red-50 text-red-500 px-8 py-3 rounded-2xl font-black hover:bg-red-100">登出</button>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div class="lg:col-span-7 space-y-8">
                            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                                <h2 class="text-2xl font-black mb-6 flex items-center gap-2">學生名單</h2>
                                <div id="students-list" class="space-y-4"></div>
                            </div>
                        </div>
                        <div class="lg:col-span-5 space-y-8">
                            <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl">
                                <h2 class="text-2xl font-black mb-6">新增學生</h2>
                                <div class="space-y-4">
                                    <input id="new-name" placeholder="學生姓名" class="w-full bg-white/10 p-4 rounded-2xl outline-none focus:bg-white/20 transition">
                                    <input id="new-id" placeholder="ID (留白自動生成)" class="w-full bg-white/10 p-4 rounded-2xl outline-none focus:bg-white/20 transition">
                                    <button onclick="registerStudent()" class="w-full bg-blue-600 py-4 rounded-2xl font-black hover:bg-blue-500 transition">確認註冊</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            updateTeacherUI();
        }

        function updateShopUI() {
            const container = document.getElementById('shop-items-list');
            if (!container || currentView !== 'shop') return;
            const items = Object.values(itemsData);
            container.innerHTML = items.length ? items.map(i => `
                <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm transition-transform hover:scale-[1.02]">
                    <h3 class="text-2xl font-black text-slate-800 mb-1">${i.name}</h3>
                    <p class="text-blue-600 text-3xl font-black mb-4">${i.cost} 點</p>
                    <p class="text-slate-400 font-bold text-sm mb-4">庫存: ${i.stock}</p>
                    <button onclick="openRedeemModal('${i.id}')" class="w-full py-3 ${i.stock > 0 ? 'bg-slate-900' : 'bg-slate-200'} text-white rounded-2xl font-black">
                        ${i.stock > 0 ? '立即兌換' : '已售罄'}
                    </button>
                </div>
            `).join('') : '<p class="col-span-full text-center text-slate-300">暫無商品</p>';
        }

        function updateTeacherUI() {
            if (currentView !== 'teacher') return;
            const sList = document.getElementById('students-list');
            if (sList) {
                const students = Object.values(studentsData).sort((a,b) => b.createdAt - a.createdAt);
                sList.innerHTML = students.map(s => `
                    <div class="flex items-center justify-between p-5 bg-slate-50 rounded-3xl">
                        <div>
                            <p class="font-black text-xl text-slate-800">${s.name}</p>
                            <p class="text-xs text-slate-400">ID: ${s.id}</p>
                            <button onclick="openChangeIdModal('${s.id}')" class="text-xs text-blue-500 font-bold underline">變更 ID</button>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updatePoints('${s.id}', false)" class="w-10 h-10 bg-white rounded-xl shadow-sm text-red-500 font-black">-</button>
                            <input id="input-${s.id}" type="number" value="1" class="w-10 text-center bg-transparent font-black">
                            <button onclick="updatePoints('${s.id}', true)" class="w-10 h-10 bg-white rounded-xl shadow-sm text-green-500 font-black">+</button>
                            <p class="text-2xl font-black text-slate-800 ml-4">${s.points}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        window.toggleLoginModal = (show) => {
            const modal = document.getElementById('login-modal');
            modal.classList.toggle('hidden', !show);
        };

        window.checkPassword = () => {
            const input = document.getElementById('admin-pw');
            if (input.value === TEACHER_PASSWORD) {
                input.value = '';
                toggleLoginModal(false);
                switchView('teacher');
            } else {
                showStatus("密碼錯誤", "error");
            }
        };

        window.registerStudent = async () => {
            if (!auth.currentUser) return;
            const name = document.getElementById('new-name').value.trim();
            const id = document.getElementById('new-id').value.trim() || 'ID_' + Math.random().toString(36).substr(2, 6);
            if (!name) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                    id, name, points: 0, createdAt: Date.now(), lastUpdate: Date.now()
                });
                showStatus("註冊成功", "success");
            } catch (e) { showStatus("註冊失敗", "error"); }
        };

        window.handleInquiry = async (id) => {
            if (!id) return;
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                const resultDiv = document.getElementById('student-result');
                if (snap.exists()) {
                    const s = snap.data();
                    resultDiv.innerHTML = `
                        <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl animate-in">
                            <h2 class="text-3xl font-black mb-1">${s.name}</h2>
                            <p class="text-slate-500 text-xs mb-8">ID: ${s.id}</p>
                            <div class="bg-blue-600 rounded-[2rem] p-8 mb-6 text-center">
                                <p class="text-7xl font-black">${s.points}</p>
                                <p class="text-xs opacity-70">目前點數</p>
                            </div>
                            <button onclick="switchView('home')" class="w-full py-4 bg-white/10 rounded-2xl font-bold">返回</button>
                        </div>
                    `;
                } else { showStatus("查無此 ID", "error"); }
            } catch (e) { showStatus("無法連接資料庫", "error"); }
        };

        // --- 初始化步驟 ---
        async function init() {
            try {
                // 第一步：處理身份驗證
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 第二步：驗證成功後設置即時監聽器
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        // 學生名單監聽
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), 
                            (snap) => {
                                studentsData = {}; snap.forEach(d => studentsData[d.id] = d.data());
                                updateTeacherUI();
                            }, 
                            (err) => console.error("學生監聽出錯:", err)
                        );
                        // 商城商品監聽
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'items'), 
                            (snap) => {
                                itemsData = {}; snap.forEach(d => itemsData[d.id] = d.data());
                                updateShopUI();
                            },
                            (err) => console.error("商城監聽出錯:", err)
                        );
                        switchView('home');
                    }
                });
            } catch (e) {
                showStatus("系統初始化失敗，請重新整理", "error");
            }
        }
        window.onload = init;
    </script>
    <style>
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen font-sans">
    
    <div id="app"></div>

    <!-- 登入彈窗 -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[9999] flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-in">
            <h2 class="text-2xl font-black mb-8 text-slate-800 text-center">教師管理登入</h2>
            <input id="admin-pw" type="password" placeholder="管理密碼" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-3xl text-center text-3xl font-black mb-6 outline-none focus:border-blue-500 transition-all">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="toggleLoginModal(false)" class="py-4 bg-slate-100 rounded-2xl font-bold text-slate-500">取消</button>
                <button onclick="checkPassword()" class="py-4 bg-slate-900 rounded-2xl font-bold text-white">登入</button>
            </div>
        </div>
    </div>

    <!-- 通用彈窗 -->
    <div id="generic-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[9999] flex items-center justify-center hidden p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-in">
            <h2 id="modal-title" class="text-2xl font-black mb-2 text-slate-800">確認操作</h2>
            <p id="modal-desc" class="text-slate-400 text-sm mb-8 font-medium">請輸入內容</p>
            <input id="modal-input" type="text" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-3xl text-center text-xl font-black mb-6 outline-none focus:border-blue-500 transition-all">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeGenericModal()" class="py-4 bg-slate-100 rounded-2xl font-bold text-slate-500">取消</button>
                <button onclick="submitGenericModal()" class="py-4 bg-slate-900 rounded-2xl font-bold text-white">確認</button>
            </div>
        </div>
    </div>

    <div id="status-msg" class="opacity-0 translate-y-10 pointer-events-none transition-all duration-300"></div>

</body>
</html>
